<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LibraVault – Library Management System</title>
  <link rel="stylesheet" href="css/style.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body class="auth-page">

  <!-- PARTICLES BACKGROUND -->
  <div class="particles" id="particles"></div>

  <!-- LOGIN / REGISTER CARD -->
  <div class="auth-wrapper">

    <!-- BRAND -->
    <div class="auth-brand">
      <div class="brand-icon"><i class="fas fa-book-open"></i></div>
      <h1 class="brand-name">LibraVault</h1>
      <p class="brand-tagline">Your Gateway to Infinite Knowledge</p>
    </div>

    <!-- TABS -->
    <div class="auth-tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="auth-form" id="loginForm">
      <div class="form-group">
        <label><i class="fas fa-envelope"></i> Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
        <span class="toggle-pw" onclick="togglePassword('loginPassword')"><i class="fas fa-eye"></i></span>
      </div>
      <div class="form-hint">
        Demo: <b>admin@library.com</b> / <b>admin123</b> &nbsp;|&nbsp; <b>john@example.com</b> / <b>user123</b>
      </div>
      <button class="btn-primary" onclick="login()">
        <span>Sign In</span> <i class="fas fa-arrow-right"></i>
      </button>
      <div id="loginError" class="error-msg"></div>
    </div>

    <!-- REGISTER FORM -->
    <div class="auth-form hidden" id="registerForm">
      <div class="form-group">
        <label><i class="fas fa-user"></i> Full Name</label>
        <input type="text" id="regName" placeholder="John Doe" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-envelope"></i> Email Address</label>
        <input type="email" id="regEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="regPassword" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-user-shield"></i> Role</label>
        <select id="regRole" onchange="toggleAdminCode(this.value)">
          <option value="user">User Account</option>
          <option value="admin">Admin Account</option>
        </select>
      </div>
      <div class="form-group hidden" id="adminCodeGroup">
        <label><i class="fas fa-key"></i> Admin Access Key</label>
        <input type="password" id="regAdminCode" placeholder="Enter admin access key" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-crown"></i> Plan</label>
        <select id="regPlan">
          <option value="free">Free Plan</option>
          <option value="paid">Paid Plan – Unlock all books</option>
        </select>
      </div>
      <button class="btn-primary" onclick="register()">
        <span>Create Account</span> <i class="fas fa-arrow-right"></i>
      </button>
      <div id="registerMsg" class="success-msg"></div>
    </div>

  </div>

  <script src="js/auth.js"></script>
</body>

</html>
